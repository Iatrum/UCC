name: Site & Credential Check

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  credential-check:
    name: Check drhidayat.com live routes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run tracked live route checks
        run: |
          set -euo pipefail

          check() {
            local url="$1"
            local expected="$2"
            local status
            status="$(curl -sS -L -o /dev/null -w '%{http_code}' "$url")"
            if [ "$status" != "$expected" ]; then
              echo "Expected $expected for $url, got $status" >&2
              exit 1
            fi
          }

          check "https://drhidayat.com/login" "200"
          check "https://demo.drhidayat.com/login" "200"
          check "https://apex.drhidayat.com/login" "200"
          check "https://drhidayat.com/api/health" "200"
