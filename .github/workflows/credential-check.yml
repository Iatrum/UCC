name: Site & Credential Check

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  credential-check:
    name: Check drhidayat.com & Medplum credentials
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run credential & site checks
        env:
          EMR_URL: https://drhidayat.com
          MEDPLUM_UI_URL: https://app.31-97-70-30.sslip.io
          MEDPLUM_ADMIN_EMAIL: ${{ secrets.MEDPLUM_ADMIN_EMAIL }}
          MEDPLUM_ADMIN_PASSWORD: ${{ secrets.MEDPLUM_ADMIN_PASSWORD }}
          CLINIC_USER_PASSWORD: ${{ secrets.CLINIC_USER_PASSWORD }}
          KLINIK_PUTERI_PASSWORD: ${{ secrets.KLINIK_PUTERI_PASSWORD }}
        run: bunx playwright test tests/e2e/credential-check.spec.ts

      - name: Upload screenshots & report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credential-check-report
          path: |
            test-results/
            playwright-report/
          retention-days: 14
